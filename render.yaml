services:
  - type: web
    name: urlaubsbuchungssystem
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: urlaubsbuchungssystem-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: NODE_VERSION
        value: 20

databases:
  - name: urlaubsbuchungssystem-db
    plan: free
